name: ocorrencia_facil
description: "Sistema de Registro de Ocorrências"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.5.0
  provider: ^6.1.2

  # Seleção de arquivos (Android, Windows e Web)
  file_picker: ^10.1.9

  # Abrir links externos (Google Drive)
  url_launcher: ^6.3.1

  # Visualização de imagens com zoom
  photo_view: ^0.15.0

  # Geração e impressão de PDF
  pdf: ^3.11.3
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/